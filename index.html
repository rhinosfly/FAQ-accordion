<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | FAQ accordion</title>
  <link rel="stylesheet" href="style.css">
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>

  <article class="faq-card">
    <div class="header">
      <img class="icon" src="assets/images/icon-star.svg" alt="faq-card-header-icon star">
      <h1 class="text">FAQs</h1>
    </div>
  </article>

  <template id="faq-dropdown-item">
    <div class="faq-dropdown-item">
      <div class="shield">
        <h1 class="question">question placeholder</h1>
        <img class="dropdown-toggle-button" src="assets/images/icon-minus.svg" , alt="dropdown-toggle-button">
      </div>
      <div class="dropdown">
        <p class="answer">answer placeholder</p>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>

</html>
